name: Integration

on:
  workflow_dispatch:
  push:
    branches: [ main, 'ci/*' ]

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Debug repo layout
        run: |
          echo "PWD: $(pwd)"
          echo "Listing root:"; ls -la
          echo "Listing workspace/backend:"; ls -la backend || true

      - name: Build backend
        run: |
          cd backend
          npm ci
          npm run build
      - name: Apply DB schema
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASS: postgres
          DB_NAME: erp
        run: |
          cd backend
          node ./src/scripts/applySchema.js
      - name: Seed RBAC
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASS: postgres
          DB_NAME: erp
        run: |
          cd backend
          node ./scripts/seedRbac.js
      - name: Start backend
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASS: postgres
          DB_NAME: erp
          JWT_SECRET: changeme
          REDIS_URL: redis://localhost:6379
        run: |
          cd backend
          nohup node dist/main.js > /tmp/backend.log 2>&1 &
          nohup node dist/worker.js > /tmp/worker.log 2>&1 &
          sleep 8
          echo "=== Backend log ==="
          cat /tmp/backend.log
          echo "=== Worker log ==="
          cat /tmp/worker.log || echo "(no worker log)"
         
          
      - name: Run E2E
        env:
          BASE_URL: http://localhost:3000/api
          ADMIN_EMAIL: admin@local
          ADMIN_PASS: admin123
        run: |
          cd backend
          node ./scripts/runE2E.js
