name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd erp/backend
          npm ci
      - name: Build
        run: |
          cd erp/backend
          npm run build || true
      - name: Run backend e2e (sketch)
        run: |
          cd erp/backend
          npm run build || true
          # e2e tests require services; this is a placeholder
          echo "E2E scaffold"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install and Build
        run: |
          cd erp/frontend
          npm ci
          npm run build || true
      - name: Deploy preview (sketch)
        run: echo "Preview step placeholder"
