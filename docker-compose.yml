version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erp
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: erp
      JWT_SECRET: changeme
    ports:
      - '3000:3000'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: ./backend
    depends_on:
      - redis
      - backend
    environment:
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:3000/api/automation/events
    command: [ "npm", "run", "worker" ]

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000/api
    ports:
      - '3001:3000'

volumes:
  db-data:
