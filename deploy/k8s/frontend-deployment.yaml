apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: erp-frontend
  template:
    metadata:
      labels:
        app: erp-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/erp-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://erp-backend:3000/api
